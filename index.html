<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="head">
      <h1>Stone Paper Scissor</h1>
    </div>
    <br />

    <div class="boxes">
      <div class="box1" id="rock"></div>
      <div class="box2" id="paper"></div>
      <div class="box3" id="scissor"></div>
    </div>

    <div class="score-board">
      <div class="score">
        <p id="user-score">0</p>
        <p>you</p>
      </div>

      <div class="score">
        <p id="comp-score">0</p>
        <p>computer</p>
      </div>
    </div>

    <div class="msg-con">
      <p id="msg">Play your move</p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
